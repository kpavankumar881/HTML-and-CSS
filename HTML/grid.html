<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grads</title>
    <style>
       .container{
        display: grid;
        height:90vh;
        grid-template-columns: 1fr 1fr 1fr 1fr;
        grid-template-rows: repeat(4,1fr);
        border:10px solid rgb(210, 222, 225);
       }
       .section1{
        background-color:blue;
        grid-column:1/5;
         border:5px solid rgb(210, 222, 225);
       }
       .section2{
        background-color:rgb(0, 187, 255);
        grid-row:2/4;
         border:5px solid rgb(210, 222, 225);
       }
        .section3{
          background-color:rgb(102, 93, 94);
            grid-area:2/2/4/4;
             border:5px solid rgb(210, 222, 225);
         }
         .section4{
           background-color:rgb(0, 187, 255);
           grid-row:2/4;
            border:5px solid rgb(210, 222, 225);
         }
            .section5{
                background-color:blue;
                grid-column:1/5;
                 border:5px solid rgb(210, 222, 225);
            }
    .container div{
        display:flex;
        justify-content: center;
        align-items: center;
        color:white;
        font-size:20px;
    }
    </style>
</head>
<body>
    <div class="container">
        <div class="section1">Header</div>
        <div class="section2">Navbar</div>
        <div class="section3">content</div>
        <div class="section4">Aside</div>
        <div class="section5">Footer</div>
    </div>
</body>
</html>
