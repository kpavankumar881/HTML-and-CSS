<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Closure</title>
</head>
<body>
        <button id="btn">Increase</button>
        <p id="number">0</p>
        <script>
            const btn=document.getElementById('number');
            function outer(){
                let num=0;
                return function(){
                    num++;
                    btn.innerText=num;
                }
            }
        </script>
</body>
</html>
