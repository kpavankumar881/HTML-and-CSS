<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fieldset</fieldset></title>
</head>
<body>
    <fieldset>
        <legend>choose your favorite city</legend>
        <div>
            <input type="radio" name="city"> 
            <label>Hyderabad</label>
        </div>
        <div>
            <input type="radio" name="city"> 
            <label>Mahabubad</label>
        </div>
        <div>
            <input type="radio" name="city"> 
            <label>Warangel</label>
        </div>
        <table>
            <tr id="row1"></tr>
            <tr id="row2"></tr>
            <tr id="row3"></tr>
            <tr id="row4"></tr>
        </table>
    </fieldset>
</body>
</html>
