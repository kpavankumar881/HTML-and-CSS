<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let arr=[1,12,30,40,50,60,9];
        let newArr=arr.map((element,index,arr)=>{
            return element*2;
        })
        console.log(newArr);
        let fil=arr.filter(function(element,index,arr){
            return element>10;
        })
        console.log(fil);
        let sum=arr.reduce((updated,ele,index,arr)=>{
            return ele+updated;
        },0);
        console.log(sum);
        let findd=arr.find(function(ele){
            return ele>=40;
        })
        console.log(findd);
         let eve=arr.every(function(ele){
            return ele>=40;
        })
        console.log(eve);
    </script>
</body>
</html>
