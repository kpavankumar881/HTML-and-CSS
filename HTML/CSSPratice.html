<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <Style>
        div+p{
            background-color:cyan;
        }
        input:valid{
            border:10px solid green;
        }
        input:invalid{
            border:10px solid red;
        }
        p:nth-child(3n+1){
            background-color:yellow;
        }
    </Style>

</head>
<body>
    <div>div1</div>
    <div>div2
        <p>p1</p>
         <p>p2</p>
          <p>p3</p>
           <p>p4</p>
    </div>
    <div>div2
        <p>p1</p>
        <p>p2</p>
        <p>p3</p>
    </div>
</body>
</html>
